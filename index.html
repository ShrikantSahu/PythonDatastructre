explain:"Multi-source BFS: start from ALL rotten oranges simultaneously. Each BFS level = 1 minute. Track fresh count. If fresh > 0 after BFS, some oranges can't be reached (-1).",
tc:"O(m * n)",tce:"Each cell processed at most once.",sc:"O(m * n)",sce:"Queue in worst case.",
alt:`# BFS is the standard approach for this problem.
# The only meaningful variation is using a timestamp instead:
def oranges_rotting_ts(grid):
    rows, cols = len(grid), len(grid[0])
    queue = deque()
    fresh = 0
    for r in range(rows):
        for c in range(cols):
            if grid[r][c] == 2: queue.append((r,c,0))
            elif grid[r][c] == 1: fresh += 1
    max_t = 0
    while queue:
        r,c,t = queue.popleft()
        for dr,dc in [(1,0),(-1,0),(0,1),(0,-1)]:
            nr,nc = r+dr, c+dc
            if 0<=nr<rows and 0<=nc<cols and grid[nr][nc]==1:
                grid[nr][nc] = 2; fresh -= 1
                max_t = max(max_t, t+1)
                queue.append((nr,nc,t+1))
    return max_t if fresh == 0 else -1`,
altExplain:"Same BFS but each queue entry carries its timestamp. Max timestamp = answer.",altTc:"O(m * n)",altSc:"O(m * n)"},

{wk:9,n:"Alien Dictionary",id:269,d:"hard",t:"graph",must:1,
sol:`from collections import defaultdict, deque
def alien_order(words):
    graph = defaultdict(set)
    indegree = {c: 0 for w in words for c in w}
    for i in range(len(words) - 1):
        w1, w2 = words[i], words[i+1]
        min_len = min(len(w1), len(w2))
        if len(w1) > len(w2) and w1[:min_len] == w2[:min_len]:
            return ""  # invalid ordering
        for j in range(min_len):
            if w1[j] != w2[j]:
                if w2[j] not in graph[w1[j]]:
                    graph[w1[j]].add(w2[j])
                    indegree[w2[j]] += 1
                break
    queue = deque(c for c in indegree if indegree[c] == 0)
    result = []
    while queue:
        c = queue.popleft()
        result.append(c)
        for nb in graph[c]:
            indegree[nb] -= 1
            if indegree[nb] == 0:
                queue.append(nb)
    return ''.join(result) if len(result) == len(indegree) else ""`,
explain:"Compare adjacent words to extract character ordering rules (first differing char gives an edge). Then topological sort the character graph. If cycle detected (not all chars processed), return empty.",
tc:"O(C)",tce:"C = total characters across all words.",sc:"O(U + min(U², C))",sce:"U unique chars, edges bounded by pairs.",
alt:`# DFS-based topological sort
def alien_order_dfs(words):
    graph = defaultdict(set)
    chars = {c for w in words for c in w}
    for i in range(len(words)-1):
        w1, w2 = words[i], words[i+1]
        ml = min(len(w1), len(w2))
        if len(w1) > len(w2) and w1[:ml] == w2[:ml]: return ""
        for j in range(ml):
            if w1[j] != w2[j]:
                graph[w1[j]].add(w2[j])
                break
    visited = {}; result = []
    def dfs(c):
        if c in visited: return visited[c]
        visited[c] = False  # visiting
        for nb in graph[c]:
            if not dfs(nb): return False
        visited[c] = True
        result.append(c)
        return True
    for c in chars:
        if not dfs(c): return ""
    return ''.join(reversed(result))`,
altExplain:"DFS topological sort: post-order gives reverse topological order. Detect cycles via 'visiting' state.",altTc:"O(C)",altSc:"O(U)"},

// WEEK 10: Dynamic Programming
{wk:10,n:"Climbing Stairs",id:70,d:"easy",t:"dp",must:1,
sol:`def climb_stairs(n):
    if n <= 2: return n
    prev2, prev1 = 1, 2
    for _ in range(3, n + 1):
        curr = prev1 + prev2
        prev2 = prev1
        prev1 = curr
    return prev1`,
explain:"ways(n) = ways(n-1) + ways(n-2). You can reach step n from step n-1 (one step) or n-2 (two steps). This is the Fibonacci sequence. Optimize space by keeping only the last two values.",
tc:"O(n)",tce:"Single loop from 3 to n.",sc:"O(1)",sce:"Two variables.",
alt:`def climb_stairs_memo(n, memo={}):
    if n <= 2: return n
    if n in memo: return memo[n]
    memo[n] = climb_stairs_memo(n-1) + climb_stairs_memo(n-2)
    return memo[n]`,
altExplain:"Top-down memoization. More intuitive recursion with caching.",altTc:"O(n)",altSc:"O(n)"},

{wk:10,n:"House Robber",id:198,d:"med",t:"dp",must:1,
sol:`def rob(nums):
    if not nums: return 0
    prev2, prev1 = 0, 0
    for num in nums:
        curr = max(prev1, prev2 + num)
        prev2 = prev1
        prev1 = curr
    return prev1`,
explain:"At each house, choose: rob it (prev2 + current value) or skip it (prev1). dp[i] = max(dp[i-1], dp[i-2] + nums[i]). Space-optimized to two variables.",
tc:"O(n)",tce:"Single pass through houses.",sc:"O(1)",sce:"Two variables.",
alt:`def rob_dp_array(nums):
    if not nums: return 0
    if len(nums) == 1: return nums[0]
    dp = [0] * len(nums)
    dp[0] = nums[0]
    dp[1] = max(nums[0], nums[1])
    for i in range(2, len(nums)):
        dp[i] = max(dp[i-1], dp[i-2] + nums[i])
    return dp[-1]`,
altExplain:"Same recurrence with full DP array. Easier to understand but uses O(n) space.",altTc:"O(n)",altSc:"O(n)"},

{wk:10,n:"Coin Change",id:322,d:"med",t:"dp",must:1,
sol:`def coin_change(coins, amount):
    dp = [float('inf')] * (amount + 1)
    dp[0] = 0
    for a in range(1, amount + 1):
        for coin in coins:
            if coin <= a:
                dp[a] = min(dp[a], dp[a - coin] + 1)
    return dp[amount] if dp[amount] != float('inf') else -1`,
explain:"Bottom-up DP: dp[i] = minimum coins needed for amount i. For each amount, try each coin denomination: dp[amount] = min(dp[amount - coin] + 1) across all coins that fit.",
tc:"O(amount * n)",tce:"amount values, n coin types each.",sc:"O(amount)",sce:"DP array.",
alt:`from collections import deque
def coin_change_bfs(coins, amount):
    if amount == 0: return 0
    visited = set([0])
    queue = deque([(0, 0)])
    while queue:
        curr, steps = queue.popleft()
        for coin in coins:
            nxt = curr + coin
            if nxt == amount: return steps + 1
            if nxt < amount and nxt not in visited:
                visited.add(nxt)
                queue.append((nxt, steps + 1))
    return -1`,
altExplain:"BFS approach: treat as shortest path problem. Each 'level' adds one coin. First time we reach the target amount = minimum coins.",altTc:"O(amount * n)",altSc:"O(amount)"},

{wk:10,n:"Longest Increasing Subsequence",id:300,d:"med",t:"dp",must:1,
sol:`def length_of_lis(nums):
    # Patience sorting / binary search approach
    from bisect import bisect_left
    tails = []
    for num in nums:
        pos = bisect_left(tails, num)
        if pos == len(tails):
            tails.append(num)
        else:
            tails[pos] = num
    return len(tails)`,
explain:"Maintain a 'tails' array where tails[i] = smallest tail of all increasing subsequences of length i+1. For each number, binary search for its position. If it extends the longest, append. Otherwise, replace to keep tails as small as possible.",
tc:"O(n log n)",tce:"n elements, binary search O(log n) each.",sc:"O(n)",sce:"Tails array.",
alt:`def length_of_lis_dp(nums):
    n = len(nums)
    dp = [1] * n
    for i in range(1, n):
        for j in range(i):
            if nums[j] < nums[i]:
                dp[i] = max(dp[i], dp[j] + 1)
    return max(dp)`,
altExplain:"Classic O(n²) DP: dp[i] = length of LIS ending at index i. For each element, check all previous elements.",altTc:"O(n²)",altSc:"O(n)"},

{wk:10,n:"Word Break",id:139,d:"med",t:"dp",must:1,
sol:`def word_break(s, word_dict):
    word_set = set(word_dict)
    dp = [False] * (len(s) + 1)
    dp[0] = True
    for i in range(1, len(s) + 1):
        for j in range(i):
            if dp[j] and s[j:i] in word_set:
                dp[i] = True
                break
    return dp[len(s)]`,
explain:"dp[i] = True if s[:i] can be segmented into dictionary words. For each position i, check all splits j: if dp[j] is True and s[j:i] is in dictionary, then dp[i] = True.",
tc:"O(n² * m)",tce:"n = len(s), checking substrings. m = avg word length for hashing.",sc:"O(n)",sce:"DP array.",
alt:`def word_break_trie(s, word_dict):
    # Using BFS
    from collections import deque
    word_set = set(word_dict)
    queue = deque([0])
    visited = set()
    while queue:
        start = queue.popleft()
        if start in visited: continue
        visited.add(start)
        for end in range(start + 1, len(s) + 1):
            if s[start:end] in word_set:
                if end == len(s): return True
                queue.append(end)
    return False`,
altExplain:"BFS approach: explore all valid word boundaries. Each position is a node, edges connect positions separated by a dictionary word.",altTc:"O(n² * m)",altSc:"O(n)"},

{wk:10,n:"Longest Common Subsequence",id:1143,d:"med",t:"dp",must:1,
sol:`def longest_common_subsequence(text1, text2):
    m, n = len(text1), len(text2)
    dp = [[0] * (n + 1) for _ in range(m + 1)]
    for i in range(1, m + 1):
        for j in range(1, n + 1):
            if text1[i-1] == text2[j-1]:
                dp[i][j] = dp[i-1][j-1] + 1
            else:
                dp[i][j] = max(dp[i-1][j], dp[i][j-1])
    return dp[m][n]`,
explain:"2D DP: if characters match, extend the diagonal (dp[i-1][j-1] + 1). If they don't match, take the better of skipping a character from either string.",
tc:"O(m * n)",tce:"Fill m×n DP table.",sc:"O(m * n)",sce:"2D DP table.",
alt:`def lcs_space_optimized(text1, text2):
    if len(text1) < len(text2):
        text1, text2 = text2, text1
    prev = [0] * (len(text2) + 1)
    for i in range(1, len(text1) + 1):
        curr = [0] * (len(text2) + 1)
        for j in range(1, len(text2) + 1):
            if text1[i-1] == text2[j-1]:
                curr[j] = prev[j-1] + 1
            else:
                curr[j] = max(prev[j], curr[j-1])
        prev = curr
    return prev[len(text2)]`,
altExplain:"Space-optimized: only keep current and previous row since each cell only depends on the row above.",altTc:"O(m * n)",altSc:"O(min(m, n))"},

{wk:10,n:"Edit Distance",id:72,d:"hard",t:"dp",must:1,
sol:`def min_distance(word1, word2):
    m, n = len(word1), len(word2)
    dp = [[0] * (n + 1) for _ in range(m + 1)]
    for i in range(m + 1): dp[i][0] = i
    for j in range(n + 1): dp[0][j] = j
    for i in range(1, m + 1):
        for j in range(1, n + 1):
            if word1[i-1] == word2[j-1]:
                dp[i][j] = dp[i-1][j-1]
            else:
                dp[i][j] = 1 + min(
                    dp[i-1][j],    # delete
                    dp[i][j-1],    # insert
                    dp[i-1][j-1]   # replace
                )
    return dp[m][n]`,
explain:"dp[i][j] = min operations to convert word1[:i] to word2[:j]. If chars match, no operation needed (take diagonal). Otherwise, try insert, delete, or replace — each costs 1 + the subproblem.",
tc:"O(m * n)",tce:"Fill m×n table.",sc:"O(m * n)",sce:"2D DP table.",
alt:`def min_distance_opt(word1, word2):
    n = len(word2)
    prev = list(range(n + 1))
    for i in range(1, len(word1) + 1):
        curr = [i] + [0]*n
        for j in range(1, n + 1):
            if word1[i-1] == word2[j-1]:
                curr[j] = prev[j-1]
            else:
                curr[j] = 1 + min(prev[j], curr[j-1], prev[j-1])
        prev = curr
    return prev[n]`,
altExplain:"Space-optimized to two rows. Same recurrence, O(n) space.",altTc:"O(m * n)",altSc:"O(n)"},

// WEEK 11: Greedy, Backtracking, Tries
{wk:11,n:"Jump Game",id:55,d:"med",t:"greedy",must:1,
sol:`def can_jump(nums):
    max_reach = 0
    for i in range(len(nums)):
        if i > max_reach:
            return False
        max_reach = max(max_reach, i + nums[i])
    return True`,
explain:"Track the farthest index we can reach. At each step, if current index is beyond our reach, we're stuck. Otherwise, update max_reach. Greedy: always extend as far as possible.",
tc:"O(n)",tce:"Single pass.",sc:"O(1)",sce:"One variable.",
alt:`def can_jump_backward(nums):
    goal = len(nums) - 1
    for i in range(len(nums) - 2, -1, -1):
        if i + nums[i] >= goal:
            goal = i
    return goal == 0`,
altExplain:"Work backward: move the goal post to the left whenever a position can reach the current goal.",altTc:"O(n)",altSc:"O(1)"},

{wk:11,n:"Subsets",id:78,d:"med",t:"backtrack",must:1,
sol:`def subsets(nums):
    result = []
    def backtrack(start, current):
        result.append(current[:])
        for i in range(start, len(nums)):
            current.append(nums[i])
            backtrack(i + 1, current)
            current.pop()
    backtrack(0, [])
    return result`,
explain:"Backtracking: at each position, choose to include or not include the current element. 'start' parameter ensures we don't revisit earlier elements (avoids duplicates).",
tc:"O(n * 2^n)",tce:"2^n subsets, O(n) to copy each.",sc:"O(n)",sce:"Recursion depth.",
alt:`def subsets_iterative(nums):
    result = [[]]
    for num in nums:
        result += [subset + [num] for subset in result]
    return result`,
altExplain:"Iterative: start with empty set. For each number, create new subsets by adding it to all existing subsets.",altTc:"O(n * 2^n)",altSc:"O(n * 2^n)"},

{wk:11,n:"Combination Sum",id:39,d:"med",t:"backtrack",must:1,
sol:`def combination_sum(candidates, target):
    result = []
    def backtrack(start, current, remaining):
        if remaining == 0:
            result.append(current[:])
            return
        if remaining < 0:
            return
        for i in range(start, len(candidates)):
            current.append(candidates[i])
            backtrack(i, current, remaining - candidates[i])
            current.pop()
    backtrack(0, [], target)
    return result`,
explain:"Backtracking with reuse: subtract each candidate from remaining target. Recurse with same index (i, not i+1) to allow reusing the same number. Stop when remaining is 0 (found combo) or negative (overshoot).",
tc:"O(n^(T/M))",tce:"T=target, M=min candidate. Exponential branching.",sc:"O(T/M)",sce:"Max recursion depth.",
alt:`# BFS/iterative approach — less common for this problem
def combination_sum_dp(candidates, target):
    dp = [[] for _ in range(target + 1)]
    dp[0] = [[]]
    for c in candidates:
        for t in range(c, target + 1):
            for combo in dp[t - c]:
                dp[t].append(combo + [c])
    return dp[target]`,
altExplain:"DP approach: build up combinations for each amount from 0 to target.",altTc:"O(n * T * combos)",altSc:"O(T * combos)"},

{wk:11,n:"Permutations",id:46,d:"med",t:"backtrack",must:1,
sol:`def permute(nums):
    result = []
    def backtrack(current, remaining):
        if not remaining:
            result.append(current[:])
            return
        for i in range(len(remaining)):
            current.append(remaining[i])
            backtrack(current, remaining[:i] + remaining[i+1:])
            current.pop()
    backtrack([], nums)
    return result`,
explain:"At each level, choose one of the remaining elements. Recurse with that element removed from available choices. When no elements remain, we have a complete permutation.",
tc:"O(n * n!)",tce:"n! permutations, O(n) to copy each.",sc:"O(n)",sce:"Recursion depth + current permutation.",
alt:`def permute_swap(nums):
    result = []
    def backtrack(start):
        if start == len(nums):
            result.append(nums[:])
            return
        for i in range(start, len(nums)):
            nums[start], nums[i] = nums[i], nums[start]
            backtrack(start + 1)
            nums[start], nums[i] = nums[i], nums[start]
    backtrack(0)
    return result`,
altExplain:"Swap-based: swap current position with each remaining position, recurse, then swap back. Avoids creating sublists.",altTc:"O(n * n!)",altSc:"O(n)"},

{wk:11,n:"Word Search",id:79,d:"med",t:"backtrack",must:1,
sol:`def exist(board, word):
    rows, cols = len(board), len(board[0])
    def dfs(r, c, idx):
        if idx == len(word): return True
        if (r < 0 or r >= rows or c < 0 or c >= cols
            or board[r][c] != word[idx]):
            return False
        temp = board[r][c]
        board[r][c] = '#'  # mark visited
        found = (dfs(r+1,c,idx+1) or dfs(r-1,c,idx+1)
                or dfs(r,c+1,idx+1) or dfs(r,c-1,idx+1))
        board[r][c] = temp  # unmark
        return found
    for r in range(rows):
        for c in range(cols):
            if dfs(r, c, 0): return True
    return False`,
explain:"DFS backtracking on the grid. At each cell, check if it matches the current character in the word. Mark visited cells (replace with '#'), explore all 4 directions, then restore (backtrack).",
tc:"O(m * n * 4^L)",tce:"Start from each cell, explore 4 directions up to word length L.",sc:"O(L)",sce:"Recursion depth = word length.",
alt:`# The DFS backtracking approach is the standard solution.
# Optimization: check if board contains all needed characters first
from collections import Counter
def exist_optimized(board, word):
    board_count = Counter(c for row in board for c in row)
    word_count = Counter(word)
    for c, cnt in word_count.items():
        if board_count.get(c, 0) < cnt:
            return False
    # If word starts with a less common char, reverse it
    if board_count[word[0]] > board_count[word[-1]]:
        word = word[::-1]
    # ... then run standard DFS as above
    rows, cols = len(board), len(board[0])
    def dfs(r, c, idx):
        if idx == len(word): return True
        if r<0 or r>=rows or c<0 or c>=cols or board[r][c]!=word[idx]:
            return False
        board[r][c], temp = '#', board[r][c]
        found = dfs(r+1,c,idx+1) or dfs(r-1,c,idx+1) or dfs(r,c+1,idx+1) or dfs(r,c-1,idx+1)
        board[r][c] = temp
        return found
    return any(dfs(r,c,0) for r in range(rows) for c in range(cols))`,
altExplain:"Optimized: pre-check character availability, reverse word if last char is rarer (prunes faster). Same core algorithm.",altTc:"O(m * n * 4^L)",altSc:"O(L)"},

{wk:11,n:"Implement Trie",id:208,d:"med",t:"trie",must:1,
sol:`class TrieNode:
    def __init__(self):
        self.children = {}
        self.is_end = False

class Trie:
    def __init__(self):
        self.root = TrieNode()

    def insert(self, word):
        node = self.root
        for c in word:
            if c not in node.children:
                node.children[c] = TrieNode()
            node = node.children[c]
        node.is_end = True

    def search(self, word):
        node = self.root
        for c in word:
            if c not in node.children:
                return False
            node = node.children[c]
        return node.is_end

    def startsWith(self, prefix):
        node = self.root
        for c in prefix:
            if c not in node.children:
                return False
            node = node.children[c]
        return True`,
explain:"Trie (prefix tree): each node has a map of children and an end-of-word flag. Insert builds paths character by character. Search follows the path and checks is_end. StartsWith only checks if the path exists.",
tc:"O(m) per operation",tce:"m = length of word/prefix.",sc:"O(n * m)",sce:"n words of average length m.",
alt:`class TrieArray:
    def __init__(self):
        self.root = [None]*26 + [False]  # 26 children + is_end flag
    def _idx(self, c): return ord(c) - ord('a')
    def insert(self, word):
        node = self.root
        for c in word:
            i = self._idx(c)
            if node[i] is None:
                node[i] = [None]*26 + [False]
            node = node[i]
        node[26] = True
    def search(self, word):
        node = self.root
        for c in word:
            i = self._idx(c)
            if node[i] is None: return False
            node = node[i]
        return node[26]`,
altExplain:"Array-based trie: use a 27-element list (26 children + end flag) instead of a dictionary. Slightly faster lookups but uses more memory.",altTc:"O(m)",altSc:"O(n * m * 26)"},

{wk:11,n:"Word Search II",id:212,d:"hard",t:"trie",must:1,
sol:`class TrieNode:
    def __init__(self):
        self.children = {}
        self.word = None

def find_words(board, words):
    root = TrieNode()
    for w in words:
        node = root
        for c in w:
            if c not in node.children:
                node.children[c] = TrieNode()
            node = node.children[c]
        node.word = w

    rows, cols = len(board), len(board[0])
    result = []
    def dfs(r, c, node):
        if r<0 or r>=rows or c<0 or c>=cols:
            return
        c_char = board[r][c]
        if c_char not in node.children:
            return
        child = node.children[c_char]
        if child.word:
            result.append(child.word)
            child.word = None  # avoid duplicates
        board[r][c] = '#'
        for dr, dc in [(1,0),(-1,0),(0,1),(0,-1)]:
            dfs(r+dr, c+dc, child)
        board[r][c] = c_char
        # Prune empty branches
        if not child.children:
            del node.children[c_char]

    for r in range(rows):
        for c in range(cols):
            dfs(r, c, root)
    return result`,
explain:"Build a trie from all words, then DFS on the board while walking the trie simultaneously. This searches for ALL words in one traversal instead of doing a separate search per word. Prune empty trie branches for efficiency.",
tc:"O(m * n * 4^L)",tce:"Traverse board cells, explore 4 dirs up to max word length L.",sc:"O(W * L)",sce:"Trie stores W words of avg length L.",
alt:`# Single-word backtracking called for each word
def find_words_brute(board, words):
    def exist(word):
        # same as Word Search I solution
        rows, cols = len(board), len(board[0])
        def dfs(r, c, idx):
            if idx == len(word): return True
            if r<0 or r>=rows or c<0 or c>=cols or board[r][c]!=word[idx]:
                return False
            board[r][c], tmp = '#', board[r][c]
            found = any(dfs(r+dr,c+dc,idx+1) for dr,dc in [(1,0),(-1,0),(0,1),(0,-1)])
            board[r][c] = tmp
            return found
        return any(dfs(r,c,0) for r in range(rows) for c in range(cols))
    return [w for w in words if exist(w)]`,
altExplain:"Run Word Search I for each word separately. Works but much slower — no shared computation between words.",altTc:"O(W * m * n * 4^L)",altSc:"O(L)"},

// WEEK 12: Advanced Patterns
{wk:12,n:"LRU Cache",id:146,d:"med",t:"design",must:1,
sol:`class Node:
    def __init__(self, key=0, val=0):
        self.key, self.val = key, val
        self.prev = self.next = None

class LRUCache:
    def __init__(self, capacity):
        self.cap = capacity
        self.cache = {}
        self.head, self.tail = Node(), Node()
        self.head.next, self.tail.prev = self.tail, self.head

    def _remove(self, node):
        node.prev.next, node.next.prev = node.next, node.prev

    def _add_to_front(self, node):
        node.next = self.head.next
        node.prev = self.head
        self.head.next.prev = node
        self.head.next = node

    def get(self, key):
        if key not in self.cache: return -1
        node = self.cache[key]
        self._remove(node)
        self._add_to_front(node)
        return node.val

    def put(self, key, value):
        if key in self.cache:
            self._remove(self.cache[key])
        node = Node(key, value)
        self.cache[key] = node
        self._add_to_front(node)
        if len(self.cache) > self.cap:
            lru = self.tail.prev
            self._remove(lru)
            del self.cache[lru.key]`,
explain:"Hash map for O(1) lookup + doubly linked list for O(1) order management. Most recently used at front, least recently used at back. On access: move to front. On insert: add to front, evict from back if over capacity.",
tc:"O(1) per operation",tce:"Hash map + DLL operations are all O(1).",sc:"O(capacity)",sce:"Store at most 'capacity' entries.",
alt:`from collections import OrderedDict
class LRUCacheOrdered:
    def __init__(self, capacity):
        self.cache = OrderedDict()
        self.cap = capacity
    def get(self, key):
        if key not in self.cache: return -1
        self.cache.move_to_end(key)
        return self.cache[key]
    def put(self, key, value):
        if key in self.cache:
            self.cache.move_to_end(key)
        self.cache[key] = value
        if len(self.cache) > self.cap:
            self.cache.popitem(last=False)`,
altExplain:"Python's OrderedDict has move_to_end and popitem — essentially a built-in DLL + hash map. Clean but interviewers may want you to implement from scratch.",altTc:"O(1)",altSc:"O(capacity)"},

{wk:12,n:"Merge Intervals",id:56,d:"med",t:"intervals",must:1,
sol:`def merge(intervals):
    intervals.sort(key=lambda x: x[0])
    merged = [intervals[0]]
    for start, end in intervals[1:]:
        if start <= merged[-1][1]:
            merged[-1][1] = max(merged[-1][1], end)
        else:
            merged.append([start, end])
    return merged`,
explain:"Sort by start time. Walk through: if current interval overlaps with the last merged one, extend the end. Otherwise, start a new merged interval.",
tc:"O(n log n)",tce:"Dominated by sorting.",sc:"O(n)",sce:"Output array.",
alt:`def merge_brute(intervals):
    intervals.sort()
    merged = []
    for iv in intervals:
        if merged and iv[0] <= merged[-1][1]:
            merged[-1] = [merged[-1][0], max(merged[-1][1], iv[1])]
        else:
            merged.append(iv[:])
    return merged`,
altExplain:"Same approach — this is the standard solution. No meaningfully different algorithm exists for interval merging.",altTc:"O(n log n)",altSc:"O(n)"},

{wk:12,n:"Meeting Rooms II",id:253,d:"med",t:"intervals",must:1,
sol:`def min_meeting_rooms(intervals):
    starts = sorted(i[0] for i in intervals)
    ends = sorted(i[1] for i in intervals)
    rooms = max_rooms = 0
    s = e = 0
    while s < len(starts):
        if starts[s] < ends[e]:
            rooms += 1
            max_rooms = max(max_rooms, rooms)
            s += 1
        else:
            rooms -= 1
            e += 1
    return max_rooms`,
explain:"Sort start and end times separately. Walk through: when a meeting starts before the earliest end, we need another room. When a meeting ends, we free a room. Track maximum concurrent rooms.",
tc:"O(n log n)",tce:"Sorting both arrays.",sc:"O(n)",sce:"Sorted arrays.",
alt:`import heapq
def min_meeting_rooms_heap(intervals):
    if not intervals: return 0
    intervals.sort()
    heap = [intervals[0][1]]  # end times
    for start, end in intervals[1:]:
        if start >= heap[0]:
            heapq.heappop(heap)
        heapq.heappush(heap, end)
    return len(heap)`,
altExplain:"Min-heap of end times. If new meeting starts after earliest ending, reuse that room (pop). Otherwise, add new room. Heap size = rooms needed.",altTc:"O(n log n)",altSc:"O(n)"},

{wk:12,n:"Longest Palindromic Substring",id:5,d:"med",t:"dp",must:1,
sol:`def longest_palindrome(s):
    result = ""
    def expand(l, r):
        nonlocal result
        while l >= 0 and r < len(s) and s[l] == s[r]:
            if r - l + 1 > len(result):
                result = s[l:r+1]
            l -= 1; r += 1
    for i in range(len(s)):
        expand(i, i)      # odd length
        expand(i, i + 1)  # even length
    return result`,
explain:"Expand around center: for each index (and each pair), expand outward while characters match. Check both odd-length (single center) and even-length (double center) palindromes.",
tc:"O(n²)",tce:"n centers, each expansion up to O(n).",sc:"O(1)",sce:"Only store the result string.",
alt:`def longest_palindrome_dp(s):
    n = len(s)
    dp = [[False]*n for _ in range(n)]
    start = max_len = 0
    for i in range(n): dp[i][i] = True
    for length in range(2, n+1):
        for i in range(n - length + 1):
            j = i + length - 1
            if length == 2:
                dp[i][j] = s[i] == s[j]
            else:
                dp[i][j] = s[i] == s[j] and dp[i+1][j-1]
            if dp[i][j] and length > max_len:
                start, max_len = i, length
    return s[start:start+max_len]`,
altExplain:"2D DP: dp[i][j] = True if s[i:j+1] is a palindrome. Build up from shorter to longer substrings.",altTc:"O(n²)",altSc:"O(n²)"},

{wk:12,n:"Rotate Image",id:48,d:"med",t:"array",must:1,
sol:`def rotate(matrix):
    n = len(matrix)
    # Transpose
    for i in range(n):
        for j in range(i + 1, n):
            matrix[i][j], matrix[j][i] = matrix[j][i], matrix[i][j]
    # Reverse each row
    for row in matrix:
        row.reverse()`,
explain:"90° clockwise rotation = transpose (swap across diagonal) + reverse each row. This is an in-place transformation — no extra matrix needed.",
tc:"O(n²)",tce:"Visit each cell once for transpose and reverse.",sc:"O(1)",sce:"In-place swaps.",
alt:`def rotate_layer(matrix):
    n = len(matrix)
    for layer in range(n // 2):
        first, last = layer, n - 1 - layer
        for i in range(first, last):
            offset = i - first
            top = matrix[first][i]
            matrix[first][i] = matrix[last-offset][first]
            matrix[last-offset][first] = matrix[last][last-offset]
            matrix[last][last-offset] = matrix[i][last]
            matrix[i][last] = top`,
altExplain:"Layer-by-layer rotation: rotate 4 elements at a time, working from the outside ring inward.",altTc:"O(n²)",altSc:"O(1)"},

// ==================== STATE ====================
const WEEK_TITLES = {
1:"Arrays & strings",2:"Hash maps & frequency",3:"Linked lists",
4:"Stacks & recursion",5:"Binary search",6:"Two pointers & sliding window",
7:"Trees & BST",8:"Heaps & priority queues",9:"Graphs — BFS & DFS",
10:"Dynamic programming",11:"Greedy, backtracking & tries",12:"Advanced patterns & revision"
};
const WEEK_MONTHS = {1:1,2:1,3:1,4:1,5:2,6:2,7:2,8:2,9:3,10:3,11:3,12:3};
const ALL_TOPICS = [...new Set(PROBLEMS.map(p=>p.t))].sort();

let statuses = {};
let openPanels = new Set();
let openWeeks = new Set();
let activeTopic = "all";
let activeStatusFilter = "all";
let activeDiffs = new Set(["easy","med","hard"]);
let searchQuery = "";

// Load saved state
try {
    const saved = localStorage.getItem('dsa_conquest_v2');
    if (saved) statuses = JSON.parse(saved);
} catch(e) {}

function saveState() {
    try { localStorage.setItem('dsa_conquest_v2', JSON.stringify(statuses)); } catch(e) {}
}

function getStatus(id) { return statuses[id] || 'not-started'; }
function cycleStatus(id) {
    const s = getStatus(id);
    if (s === 'not-started') statuses[id] = 'progress';
    else if (s === 'progress') statuses[id] = 'solved';
    else delete statuses[id];
    saveState();
    render();
}

// ==================== RENDERING ====================
function render() {
    renderTopicFilters();
    renderProblems();
    updateStats();
}

function renderTopicFilters() {
    const el = document.getElementById('topicFilters');
    let html = `<button class="filter-btn ${activeTopic==='all'?'on':''}" onclick="setTopic('all')">All topics</button>`;
    html += `<button class="filter-btn ${activeTopic==='must'?'on':''}" onclick="setTopic('must')">Must-solve only</button>`;
    ALL_TOPICS.forEach(t => {
        html += `<button class="filter-btn ${activeTopic===t?'on':''}" onclick="setTopic('${t}')">${t}</button>`;
    });
    el.innerHTML = html;
}

function setTopic(t) { activeTopic = t; render(); }
function setStatusFilter(s, btn) {
    activeStatusFilter = s;
    document.querySelectorAll('.sf').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    render();
}
function toggleDiff(d, btn) {
    if (activeDiffs.has(d)) activeDiffs.delete(d); else activeDiffs.add(d);
    btn.classList.toggle('on');
    render();
}

function filterProblems() {
    return PROBLEMS.filter(p => {
        if (!activeDiffs.has(p.d)) return false;
        if (activeTopic !== 'all' && activeTopic !== 'must' && p.t !== activeTopic) return false;
        if (activeTopic === 'must' && !p.must) return false;
        if (activeStatusFilter !== 'all' && getStatus(p.id) !== activeStatusFilter) return false;
        if (searchQuery) {
            const q = searchQuery.toLowerCase();
            if (!p.n.toLowerCase().includes(q) && !p.t.toLowerCase().includes(q) && !String(p.id).includes(q)) return false;
        }
        return true;
    });
}

function renderProblems() {
    const filtered = filterProblems();
    const byWeek = {};
    filtered.forEach(p => {
        if (!byWeek[p.wk]) byWeek[p.wk] = [];
        byWeek[p.wk].push(p);
    });

    let html = '';
    for (let wk = 1; wk <= 12; wk++) {
        if (!byWeek[wk]) continue;
        const probs = byWeek[wk];
        const m = WEEK_MONTHS[wk];
        const mClass = m===1?'wk-m1':m===2?'wk-m2':'wk-m3';
        const solved = probs.filter(p=>getStatus(p.id)==='solved').length;
        const isOpen = openWeeks.has(wk);

        html += `<div class="week-section">`;
        html += `<div class="week-header" onclick="toggleWeek(${wk})">`;
        html += `<span class="wk-badge ${mClass}">Week ${wk}</span>`;
        html += `<span class="wk-title">${WEEK_TITLES[wk]}</span>`;
        html += `<span class="wk-prog">${solved}/${probs.length}</span>`;
        html += `<span class="wk-arrow ${isOpen?'open':''}">&#9654;</span>`;
        html += `</div>`;
        html += `<div class="prob-grid ${isOpen?'open':''}">`;
        probs.forEach(p => {
            const st = getStatus(p.id);
            const panelOpen = openPanels.has(p.id);
            html += `<div class="prob-card status-${st}">`;
            html += `<div class="prob-top">`;
            html += `<div class="status-btn ${st==='solved'?'solved':st==='progress'?'progress':''}" onclick="cycleStatus(${p.id})" title="Click to change status">`;
            html += `<span class="status-tooltip">${st==='not-started'?'Mark in progress':st==='progress'?'Mark solved':'Mark not started'}</span>`;
            html += `</div>`;
            html += `<div class="prob-info">`;
            html += `<div class="prob-name"><span class="prob-id">#${p.id}</span> ${p.n}</div>`;
            html += `<div class="prob-meta">`;
            html += `<span class="diff-tag diff-${p.d}">${p.d==='easy'?'Easy':p.d==='med'?'Medium':'Hard'}</span>`;
            html += `<span class="topic-tag">${p.t}</span>`;
            if (p.must) html += `<span class="must-tag">Must solve</span>`;
            html += `</div></div>`;
            html += `<button class="sol-toggle ${panelOpen?'open':''}" onclick="togglePanel(${p.id})">${panelOpen?'Hide solution':'Show solution'}</button>`;
            html += `</div>`;
            // Solution panel
            html += `<div class="sol-panel ${panelOpen?'open':''}" id="panel-${p.id}">`;
            html += `<div class="sol-tabs">`;
            html += `<button class="sol-tab on" onclick="switchSolTab(${p.id},'optimal',this)">Optimal solution</button>`;
            html += `<button class="sol-tab" onclick="switchSolTab(${p.id},'alt',this)">Alternate approach</button>`;
            html += `</div>`;
            // Optimal
            html += `<div class="sol-content on" id="sol-optimal-${p.id}">`;
            html += `<div class="sol-section"><h4>Explanation</h4><p class="sol-explain">${p.explain}</p></div>`;
            html += `<div class="sol-section"><h4>Code (Python)</h4><div class="code-block">${escapeHtml(p.sol)}</div></div>`;
            html += `<div class="sol-section"><h4>Complexity</h4><div class="complexity-grid">`;
            html += `<div class="cx-card"><div class="cx-label">Time</div><div class="cx-val">${p.tc}</div><div class="cx-note">${p.tce}</div></div>`;
            html += `<div class="cx-card"><div class="cx-label">Space</div><div class="cx-val">${p.sc}</div><div class="cx-note">${p.sce}</div></div>`;
            html += `</div></div></div>`;
            // Alt
            html += `<div class="sol-content" id="sol-alt-${p.id}">`;
            html += `<div class="sol-section"><h4>Alternate approach</h4><p class="sol-explain">${p.altExplain}</p></div>`;
            html += `<div class="sol-section"><h4>Code (Python)</h4><div class="code-block">${escapeHtml(p.alt)}</div></div>`;
            html += `<div class="sol-section"><h4>Complexity</h4><div class="complexity-grid">`;
            html += `<div class="cx-card"><div class="cx-label">Time</div><div class="cx-val">${p.altTc}</div></div>`;
            html += `<div class="cx-card"><div class="cx-label">Space</div><div class="cx-val">${p.altSc}</div></div>`;
            html += `</div></div></div>`;
            html += `</div></div>`;
        });
        html += `</div></div>`;
    }
    document.getElementById('mainContent').innerHTML = html;
}

function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleWeek(wk) {
    if (openWeeks.has(wk)) openWeeks.delete(wk); else openWeeks.add(wk);
    render();
}
function togglePanel(id) {
    if (openPanels.has(id)) openPanels.delete(id); else openPanels.add(id);
    render();
}
function switchSolTab(id, tab, btn) {
    const optEl = document.getElementById(`sol-optimal-${id}`);
    const altEl = document.getElementById(`sol-alt-${id}`);
    const tabs = btn.parentElement.querySelectorAll('.sol-tab');
    tabs.forEach(t=>t.classList.remove('on'));
    btn.classList.add('on');
    if (tab === 'optimal') { optEl.classList.add('on'); altEl.classList.remove('on'); }
    else { altEl.classList.add('on'); optEl.classList.remove('on'); }
}

function updateStats() {
    const total = PROBLEMS.length;
    const solved = PROBLEMS.filter(p=>getStatus(p.id)==='solved').length;
    const progress = PROBLEMS.filter(p=>getStatus(p.id)==='progress').length;
    const must = PROBLEMS.filter(p=>p.must);
    const mustSolved = must.filter(p=>getStatus(p.id)==='solved').length;
    const pct = total ? Math.round(solved / total * 100) : 0;

    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('headerStats').innerHTML = `
        <div class="h-stat"><div class="h-stat-val" style="color:var(--green)">${solved}</div><div class="h-stat-label">Solved</div></div>
        <div class="h-stat"><div class="h-stat-val" style="color:var(--blue)">${progress}</div><div class="h-stat-label">In progress</div></div>
        <div class="h-stat"><div class="h-stat-val" style="color:var(--orange)">${mustSolved}/${must.length}</div><div class="h-stat-label">Must-solve</div></div>
        <div class="h-stat"><div class="h-stat-val">${total - solved - progress}</div><div class="h-stat-label">Remaining</div></div>
    `;
}

// Search
document.getElementById('searchBox').addEventListener('input', function(e) {
    searchQuery = e.target.value;
    render();
});

// Back to top
window.addEventListener('scroll', function() {
    document.getElementById('btt').classList.toggle('show', window.scrollY > 400);
});

// Initial render
render();
// Open week 1 by default
openWeeks.add(1);
render();
</script>
</body>
</html>
